apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecolink-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/DOAN2-UQT-KN/ecolink-argocd.git
    targetRevision: main
    path: applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
