apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - argocd.ecolink.id.vn
      secretName: ecolink-argocd-tls
  rules:
    - host: argocd.ecolink.id.vn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
