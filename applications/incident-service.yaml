apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: incident-service
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ecolink
  source:
    repoURL: https://github.com/DOAN2-UQT-KN/helm.git
    targetRevision: main
    path: charts/incident-service
    helm:
      releaseName: incident-service
      valuesObject:
        image:
          repository: uqtri/incident-service
          tag: 20260428-100754-c2fa94e
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
