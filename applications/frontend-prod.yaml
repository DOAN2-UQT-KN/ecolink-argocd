apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecolink-fe
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  
  source:
    repoURL: https://github.com/DOAN2-UQT-KN/helm.git
    targetRevision: main 
    path: helm/charts/frontend
    helm:
      values: |
        image:
          repository: uqtri/ecolink-fe
          tag: latest
        replicaCount: 1
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 10
          targetCPUUtilizationPercentage: 80
          targetMemoryUtilizationPercentage: 80
        ingress:
          enabled: true
          className: "nginx"
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
            nginx.ingress.kubernetes.io/rate-limit: "500"
          hosts:
            - host: ecolink.id.vn
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - secretName: frontend-tls
              hosts:
                - ecolink.id.vn
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  
  syncPolicy:
    # Manual sync for production - require explicit approval
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas

