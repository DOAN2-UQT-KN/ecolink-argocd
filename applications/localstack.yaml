# Optional dev-only: in-cluster LocalStack SQS. Deploy before or with incident / notification services.
# Service DNS short name is the Helm release name when release name equals chart name (e.g. releaseName: localstack → http://localstack:4566).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: localstack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ecolink
  source:
    repoURL: https://github.com/DOAN2-UQT-KN/helm.git
    targetRevision: main
    path: charts/localstack
    helm:
      releaseName: localstack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
