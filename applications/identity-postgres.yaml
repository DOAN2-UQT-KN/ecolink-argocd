apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: identity-postgres
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: ecolink

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: "16.x.x"

    helm:
      releaseName: identity-postgres
      valuesObject:
        architecture: standalone

        image:
          registry: docker.io
          repository: postgres
          tag: "16"

        auth:
          username: identity
          password: identity
          database: identitydb

        primary:
          persistence:
            enabled: true
            size: 5Gi

          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi

        service:
          ports:
            postgresql: 5432

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
