name: Update Image Tag

on:
  repository_dispatch:
    types: [update-image]

permissions:
  contents: write

jobs:
  update-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag
        run: |
          FILE="${{ github.event.client_payload.file }}"
          TAG="${{ github.event.client_payload.tag }}"

          if [ ! -f "$FILE" ]; then
            echo "File $FILE không tồn tại"
            exit 1
          fi

          yq -i '
            .spec.source.helm.values.image.tag = strenv(TAG)
          ' "$FILE"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${{ github.event.client_payload.file }}"

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update image tag to ${{ github.event.client_payload.tag }}"
          git push 
